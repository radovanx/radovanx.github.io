  document.addEventListener("astro:page-load", function() {
    var screen = document.getElementById("tv-screen");
    var poster = document.getElementById("tv-poster");
    var iframeContainer = document.getElementById("tv-iframe-container");
    var playBtn = document.getElementById("tv-play-btn");
    var titleEl = document.getElementById("tv-title");
    var topicEl = document.getElementById("tv-topic");
    var articleLink = document.getElementById("tv-article-link");
    var thumbCards = document.querySelectorAll(".tv-thumb-card");

    if (!screen || screen.dataset.bound) return;
    screen.dataset.bound = "1";

    var currentVideoId = "";
    var basePath = document.querySelector("a[href*='wiki/']")?.getAttribute("href")?.replace(/\/wiki\/.*/, "") || "";

    function loadVideo(videoId, title, topic, topicColor, articleId, articleTitle) {
      currentVideoId = videoId;
      if (poster) poster.src = "https://i.ytimg.com/vi/" + videoId + "/maxresdefault.jpg";
      if (iframeContainer) iframeContainer.innerHTML = "";
      if (playBtn) playBtn.hidden = false;
      if (titleEl) titleEl.textContent = title;
      if (topicEl) { topicEl.textContent = topic; topicEl.style.color = topicColor; }
      if (articleLink) {
        if (articleId) {
          articleLink.href = basePath + "/wiki/" + articleId + "/";
          articleLink.style.display = "";
        } else {
          articleLink.style.display = "none";
        }
      }
      // Mark active thumb
      thumbCards.forEach(function(c) {
        c.setAttribute("data-active", c.getAttribute("data-video-id") === videoId ? "true" : "false");
      });
      // Scroll player into view
      screen.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function playCurrentVideo() {
      if (!currentVideoId) {
        var first = document.querySelector(".tv-thumb-card");
        if (first) currentVideoId = first.getAttribute("data-video-id") || "";
      }
      if (!currentVideoId || !iframeContainer) return;
      iframeContainer.innerHTML = '<iframe src="https://www.youtube.com/embed/' + currentVideoId + '?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
      if (playBtn) playBtn.hidden = true;
      if (poster) poster.style.display = "none";
    }

    // Click play button
    if (playBtn) playBtn.addEventListener("click", playCurrentVideo);
    if (screen) screen.addEventListener("click", function(e) {
      if (e.target === screen || e.target === poster) playCurrentVideo();
    });

    // Click thumbnail
    thumbCards.forEach(function(card) {
      card.addEventListener("click", function() {
        var vid = card.getAttribute("data-video-id");
        var title = card.getAttribute("data-title");
        var topic = card.getAttribute("data-topic");
        var color = card.getAttribute("data-topic-color");
        var artId = card.getAttribute("data-article-id");
        var artTitle = card.getAttribute("data-article-title");
        loadVideo(vid, title, topic, color, artId, artTitle);
        // Auto-play on thumbnail click
        if (poster) poster.style.display = "";
        setTimeout(playCurrentVideo, 100);
      });
    });

    // Initialize first video
    if (thumbCards.length > 0) {
      var first = thumbCards[0];
      currentVideoId = first.getAttribute("data-video-id") || "";
      first.setAttribute("data-active", "true");
    }
  });
</script>
