    var playBtn = document.getElementById("tv-play-btn");
    var titleEl = document.getElementById("tv-title");
    var topicEl = document.getElementById("tv-topic");
    var articleLink = document.getElementById("tv-article-link");
    var items = document.querySelectorAll(".tv-item");

    if (!screen || screen.dataset.bound) return;
    screen.dataset.bound = "1";

    var currentVideoId = "";
    var basePath = "";
    var linkEl = document.querySelector("a[href*='/wiki/']");
    if (linkEl) basePath = linkEl.getAttribute("href").replace(/\/wiki\/.*/, "");

    function selectVideo(videoId, title, topic, topicColor, articleId) {
      currentVideoId = videoId;
      if (poster) { poster.src = "https://i.ytimg.com/vi/" + videoId + "/maxresdefault.jpg"; poster.style.display = ""; }
      if (iframeContainer) iframeContainer.innerHTML = "";
      if (playBtn) playBtn.hidden = false;
      if (titleEl) titleEl.textContent = title;
      if (topicEl) { topicEl.textContent = topic; }
      if (articleLink) {
        if (articleId) { articleLink.href = basePath + "/wiki/" + articleId + "/"; articleLink.style.display = ""; }
        else { articleLink.style.display = "none"; }
      }
      items.forEach(function(c) {
        if (c.getAttribute("data-video-id") === videoId) c.classList.add("tv-item--active");
        else c.classList.remove("tv-item--active");
      });
    }

    function playVideo() {
      if (!currentVideoId || !iframeContainer) return;
      iframeContainer.innerHTML = '<iframe src="https://www.youtube.com/embed/' + currentVideoId + '?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:0;"></iframe>';
      if (playBtn) playBtn.hidden = true;
      if (poster) poster.style.display = "none";
    }

    if (playBtn) playBtn.addEventListener("click", playVideo);
    if (screen) screen.addEventListener("click", function(e) {
      if (e.target === screen || e.target === poster) playVideo();
    });

    items.forEach(function(item) {
      item.addEventListener("click", function() {
        selectVideo(
          item.getAttribute("data-video-id"),
          item.getAttribute("data-title"),
          item.getAttribute("data-topic"),
          item.getAttribute("data-topic-color"),
          item.getAttribute("data-article-id")
        );
        setTimeout(playVideo, 80);
        screen.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });
    });

    // Init first video
    if (items.length > 0) {
      currentVideoId = items[0].getAttribute("data-video-id") || "";
    }

    // --- Filtering ---
    var searchInput = document.getElementById("tv-search");
    var pills = document.querySelectorAll(".tv-pill");
    var countEl = document.getElementById("tv-count");
    var activeTopic = "all";

    function filterPlaylist() {
      var query = (searchInput ? searchInput.value : "").toLowerCase().trim();
      var visible = 0;
      items.forEach(function(item) {
        var title = (item.getAttribute("data-title") || "").toLowerCase();
        var topic = (item.getAttribute("data-topic") || "").toLowerCase();
        var matchTopic = activeTopic === "all" || topic === activeTopic;
        var matchSearch = !query || title.indexOf(query) !== -1 || topic.indexOf(query) !== -1;
        var show = matchTopic && matchSearch;
        item.style.display = show ? "" : "none";
        if (show) visible++;
      });
      if (countEl) countEl.textContent = visible;
    }

    if (searchInput) {
      searchInput.addEventListener("input", filterPlaylist);
    }

    pills.forEach(function(pill) {
      pill.addEventListener("click", function() {
        pills.forEach(function(p) { p.classList.remove("tv-pill--active"); });
        pill.classList.add("tv-pill--active");
        activeTopic = pill.getAttribute("data-topic") || "all";
        filterPlaylist();
      });
    });
  });
</script>
