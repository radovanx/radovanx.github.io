      // Dark mode: Astro docs pattern (docs.astro.build/en/tutorial/6-islands/2/)
      // Single is:inline script — event delegation so the click handler
      // survives every view-transition DOM swap without data-astro-rerun.
      function applyTheme() {
        var saved = localStorage.getItem("theme");
        var isDark = saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", isDark);
      }
      applyTheme();
      document.addEventListener("astro:after-swap", applyTheme);
      // Close mobile menu on navigation
      document.addEventListener("astro:before-swap", function() {
        document.documentElement.classList.remove("mobile-menu-open");
      });
      document.addEventListener("click", function(e) {
        if (e.target.closest("#theme-toggle")) {
          var isDark = document.documentElement.classList.toggle("dark");
          localStorage.setItem("theme", isDark ? "dark" : "light");
        }
        if (e.target.closest("#mobile-menu-toggle")) {
          document.documentElement.classList.toggle("mobile-menu-open");
        }
        if (e.target.closest(".mobile-overlay-link")) {
          document.documentElement.classList.remove("mobile-menu-open");
        }
        if (e.target.closest("#mobile-overlay-backdrop")) {
          document.documentElement.classList.remove("mobile-menu-open");
        }
      });
    </script><link rel="stylesheet" href="/knowledge/_astro/Base.DnK7f7sy.css">
